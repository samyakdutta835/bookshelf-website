<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bookshelf | Shop</title>
  <link rel="stylesheet" href="../assets/css/style.css">
  <link rel="icon" type="image/png" href="../assets/images/favicon.png">
</head>

<body>

  <header class="header active">
    <div class="header-bottom">
      <div class="container">
        <nav class="navbar">
          <ul class="navbar-list">
            <li><a href="../index.html" class="navbar-link">Home</a></li>
            <li><a href="blog.html" class="navbar-link">Blog</a></li>
            <li><a href="shop.html" navbar-link>Shop</a></li>
            <li><a href="about.html" class="navbar-link">About Us</a></li>
            <li><a href="contact.html" class="navbar-link">Contact</a></li>
          </ul>
        </nav>
      </div>
    </div>
  </header>

  <section class="section hero has-bg-image" style="background-image: url('./assets/images/hero-bg.jpg')">
    <div class="container">
      <div class="hero-content">
        <h1 class="h1 hero-title">Explore Our Book Store</h1>
        <p class="hero-text">
          Browse bestselling novels, educational books, self-help guides, and timeless classics.
        </p>
      </div>
    </div>
  </section>

  <section class="section featured">

    <div class="container">

      <div class="grid-list">

        <!-- Atomic Habits -->

        <div class="product-card">

          <figure class="card-banner">

            <img src="../assets/images/Atomic_Habits.png" alt="Atomic Habits" class="img-cover">

          </figure>

          <div class="card-content">

            <h3 class="h3">
              Atomic Habits
            </h3>

            <p class="card-price">
              ₹499
            </p>

          </div>

        </div>





        <!-- Rich Dad Poor Dad -->

        <div class="product-card">

          <figure class="card-banner">

            <img src="../assets/images/rich_poor.png" alt="Rich Dad Poor Dad" class="img-cover">

          </figure>

          <div class="card-content">

            <h3 class="h3">
              Rich Dad Poor Dad
            </h3>

            <p class="card-price">
              ₹399
            </p>

          </div>

        </div>





        <!-- The Alchemist -->

        <div class="product-card">

          <figure class="card-banner">

            <img src="../assets/images/the.png" alt="The Alchemist" class="img-cover">

          </figure>

          <div class="card-content">

            <h3 class="h3">
              The Alchemist
            </h3>

            <p class="card-price">
              ₹299
            </p>

          </div>

        </div>

      </div>

    </div>

  </section>

</body>

</html>
