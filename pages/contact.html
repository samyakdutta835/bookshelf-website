<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bookshelf | Contact</title>
  <link rel="stylesheet" href="../assets/css/style.css">
  <link rel="icon" type="image/png" href="../assets/images/favicon.png">
</head>
<body>

<header class="header active">
  <div class="header-bottom">
    <div class="container">
      <nav class="navbar">
        <ul class="navbar-list">
          <li><a href="../index.html" class="navbar-link">Home</a></li>
          <li><a href="blog.html" class="navbar-link">Blog</a></li>
          <li><a href="shop.html" navbar-link>Shop</a></li>
          <li><a href="about.html" class="navbar-link">About Us</a></li>
          <li><a href="contact.html" class="navbar-link">Contact</a></li>
        </ul>
      </nav>
    </div>
  </div>
</header>

<section class="section hero has-bg-image" style="background-image: url('./assets/images/hero-bg.jpg')">
  <div class="container">
    <div class="hero-content">
      <h1 class="h1 hero-title">Contact Us</h1>
      <p class="hero-text">
        Have questions or suggestions? We'd love to hear from you.
      </p>
    </div>
  </div>
</section>

<section class="section">
  <div class="container">

    <form>
      <input type="text" placeholder="Your Name" class="input-field" required>
      <br><br>
      <input type="email" placeholder="Your Email" class="input-field" required>
      <br><br>
      <textarea placeholder="Your Message" class="input-field" rows="6" required></textarea>
      <br><br>
      <button class="btn">Send Message</button>
    </form>

  </div>
</section>

</body>
</html>
